<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maul Dev</title>

    <link rel="icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <meta name="api-base" content="https://simple-go-production.up.railway.app">
    <link rel="stylesheet" href="css/style.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>

    <!-- MAIN APP WRAPPER -->
    <div class="container content-center page-stack">

        <!-- NAVBAR -->
        <nav
            hx-get="/components/navbar.html"
            hx-trigger="load"
            hx-swap="innerHTML">
        </nav>

        <!-- CONTENT AREA -->
        <main class="page-stack">

            <div id="loading" class="hidden">
                <p class="text-meta">Loading...</p>
            </div>

            <section id="content"
                hx-get="/pages/home.html"
                hx-trigger="load"
                hx-swap="innerHTML">
            </section>

        </main>

        <!-- FOOTER -->
        <footer style="text-align:center;">
            <p class="text-meta">Architecture: HTMX</p>
        </footer>

    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>

    <!--
        Skill Tree — dimuat di sini (bawah body), bukan di <head>.
        Tidak pakai defer supaya window.initSkillTree tersedia
        sebelum htmx:afterSwap pertama kali fired.
    -->
    <script src="js/ui-interactive.js"></script>

    <script>
        const API_BASE = document
            .querySelector('meta[name="api-base"]')
            .getAttribute("content");

        const BASE_PATH = "";

        /* =========================================================
           HTMX ROUTING
        ========================================================= */
        document.body.addEventListener("htmx:configRequest", function (event) {
            let path = event.detail.path;
            if (!path) return;
            if (path.startsWith("/api")) {
                event.detail.path = API_BASE + path;
                return;
            }
            if (!path.startsWith("http")) {
                event.detail.path = BASE_PATH + path;
            }
        });

        /* =========================================================
           NAV ACTIVE STATE
        ========================================================= */
        function setActive(button) {
            document.querySelectorAll(".nav-btn")
                .forEach(btn => btn.classList.remove("is-active"));
            button.classList.add("is-active");
        }

        document.body.addEventListener("click", function (e) {
            const btn = e.target.closest(".nav-btn");
            if (btn) setActive(btn);
        });

        /* =========================================================
           LOADING STATE
        ========================================================= */
        const loadingEl = document.getElementById("loading");

        document.body.addEventListener("htmx:beforeRequest", () => {
            loadingEl?.classList.remove("hidden");
        });

        document.body.addEventListener("htmx:afterRequest", () => {
            loadingEl?.classList.add("hidden");
        });

        /* =========================================================
           SKILL TREE
           htmx:afterSwap fired setelah DOM konten baru siap.
           Cek #tree-lines supaya hanya jalan di halaman about.
        ========================================================= */
        document.body.addEventListener("htmx:afterSwap", () => {
            if (document.getElementById("tree-lines")) {
                window.initSkillTree?.();
            }
        });

        /* =========================================================
           ERROR HANDLING
        ========================================================= */
        document.body.addEventListener("htmx:responseError", (event) => {
            loadingEl?.classList.add("hidden");
            const status = event.detail.xhr.status;
            console.error("HTMX Error:", { status, response: event.detail.xhr.responseText });
            handleError(status);
        });

        document.body.addEventListener("htmx:sendError", () => {
            loadingEl?.classList.add("hidden");
            safeLoadError("/pages/errors/network.html");
        });

        /* =========================================================
           ERROR ROUTER
        ========================================================= */
        function handleError(status) {
            if (status === 404)     safeLoadError("/pages/errors/404.html");
            else if (status >= 500) safeLoadError("/pages/errors/500.html");
            else                    safeLoadError("/pages/errors/general.html");
        }

        let isHandlingError = false;

        function safeLoadError(path) {
            if (isHandlingError) return;
            isHandlingError = true;
            htmx.ajax("GET", path, "#content");
        }
    </script>

</body>
</html>
